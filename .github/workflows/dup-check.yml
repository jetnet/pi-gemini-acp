name: dup-check

on:
  pull_request:
    paths: ["src/**/*.ts"]

permissions:
  contents: read

jobs:
  similarity:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.19.0
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check for code duplication
        run: npm run dup-check
