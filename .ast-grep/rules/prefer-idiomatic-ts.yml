# ============================================================================
# prefer-idiomatic-ts — TypeScript idiom rules.
#
# Mostly nudges (warnings) toward modern, terse TypeScript. Section 0 holds
# hard requirements (errors) that are also TS-idiom-shaped but represent
# project-wide invariants rather than style preferences.
#
# Rules that DUPLICATE oxlint coverage (categories correctness/suspicious/
# perf/pedantic + the typescript/unicorn plugins) have been removed — see
# the "Removed (oxlint covers)" list at the bottom.
#
# Sections:
#   0. Hard requirements (severity: error) — build-correctness invariants
#   1. Outdated idioms → modern API           (severity: warning)
#   2. Verbose boilerplate → one-liner        (severity: warning)
#   3. Pointless wrapping / cloning           (severity: warning)
#   4. Loop and array anti-patterns           (severity: warning)
#   5. Misc anti-patterns                     (severity: warning)
#   * Disabled rules (with reasons) appear at the bottom.
# ============================================================================

# ----------------------------------------------------------------------------
# 0. Hard requirements — TS-idiom-shaped invariants that BLOCK commits.
#    These pair with tsc gates (pre-push) but fire faster at pre-commit time.
# ----------------------------------------------------------------------------

id: no-js-import-extension
language: TypeScript
severity: error
message: "Relative imports must use .ts extension, not .js"
note: |
  This project enables `allowImportingTsExtensions` and the Pi runtime loads
  .ts files directly. Relative import paths must reference the actual source
  file (.ts), not the historical .js convention.

  ✅ import { x } from "./foo.ts";
  ❌ import { x } from "./foo.js";

  Bare specifiers (`node:fs`, `@earendil-works/pi-ai`) are unaffected.
rule:
  kind: import_statement
  has:
    kind: string
    regex: '"\.\.?/[^"]*\.js"'
files:
  - "src/**/*.ts"
ignores:
  - "**/__tests__/**"
  - "**/*.test.ts"
  - "**/*.spec.ts"

---
# ----------------------------------------------------------------------------
# 1. Outdated idioms → modern API
# ----------------------------------------------------------------------------

id: ts-void-zero
language: typescript
severity: warning
message: "void 0 for undefined — use undefined directly"
metadata: { weight: 2, category: slop }
rule:
  kind: unary_expression
  pattern: "void 0"
---
id: ts-typeof-equality
language: typescript
severity: warning
message: "typeof x === '...' for object-shape checks — use instanceof or a type guard"
metadata: { weight: 2, category: slop }
rule:
  kind: binary_expression
  pattern: "typeof $X === '$TYPE'"
---
id: ts-unnecessary-bind
language: typescript
severity: warning
message: "fn.bind(this) inside arrow function — arrow functions capture this lexically"
metadata: { weight: 2, category: slop }
rule:
  kind: call_expression
  pattern: "$FN.bind(this)"

---
# ----------------------------------------------------------------------------
# 2. Verbose boilerplate → one-liner
# ----------------------------------------------------------------------------

id: ts-boolean-return-if-else
language: typescript
severity: warning
message: "if/else returning true/false — return the condition (or its negation) directly"
metadata: { weight: 3, category: slop }
rule:
  kind: if_statement
  any:
    - pattern: "if ($COND) { return true; } else { return false; }"
    - pattern: "if ($COND) { return false; } else { return true; }"

---
# ----------------------------------------------------------------------------
# 3. Pointless wrapping / cloning
# ----------------------------------------------------------------------------

id: ts-array-map-ceremony
language: typescript
severity: warning
message: "Array.from(arr) or arr.map(x => x) is unnecessary ceremony — use arr directly"
metadata: { weight: 2, category: slop }
rule:
  any:
    - kind: call_expression
      pattern: "Array.from($ARR)"
      not:
        has:
          kind: arguments
    - kind: arrow_function
      pattern: "$ARR.map(x => x)"
---
id: ts-double-negation
language: typescript
severity: warning
message: "!!value to coerce boolean — use Boolean(value) or truthiness directly"
metadata: { weight: 2, category: slop }
rule:
  kind: unary_expression
  pattern: "!!$X"
---
id: ts-slice-copy
language: typescript
severity: warning
message: "arr.slice() to copy — use [...arr] spread"
metadata: { weight: 2, category: slop }
rule:
  pattern: "$ARR.slice()"
  not:
    pattern: "$ARR.slice($START)"
---
id: ts-defensive-null-guard
language: typescript
severity: warning
message: "if (x === null || x === undefined) return null — overly defensive early guard"
metadata: { weight: 2, category: slop }
rule:
  kind: if_statement
  any:
    - pattern: "if ($X === null || $X === undefined) { return null; }"
    - pattern: "if ($X == null) { return null; }"

---
# ----------------------------------------------------------------------------
# 4. Loop and array anti-patterns
# ----------------------------------------------------------------------------

id: ts-while-index-length
language: typescript
severity: warning
message: "while loop with index < length — use for-of or array methods"
metadata: { weight: 3, category: slop }
rule:
  kind: while_statement
  pattern: "while ($I < $ARR.length) { $$$ }"
---
id: ts-unnecessary-array-from
language: typescript
severity: warning
message: "Array.from(iterable) in for-of — iterate directly"
metadata: { weight: 2, category: slop }
rule:
  kind: for_in_statement
  has:
    kind: call_expression
    pattern: "Array.from($ITER)"
---
id: ts-unnecessary-array-concat
language: typescript
severity: warning
message: "arr.concat([item]) in loop — use arr.push(item) or spread [...arr, item]"
metadata: { weight: 3, category: slop }
rule:
  kind: for_statement
  has:
    kind: statement_block
    has:
      kind: expression_statement
      has:
        kind: call_expression
        pattern: "$ARR.concat([$ITEM])"
---
id: ts-array-concat-spread
language: typescript
severity: warning
message: "arr.concat([...items]) — use arr.push(...items) or [...arr, ...items]"
metadata: { weight: 2, category: slop }
rule:
  kind: call_expression
  pattern: "$ARR.concat([...$ITEMS])"
---
id: ts-array-every-some
language: typescript
severity: warning
message: "arr.map(x => x.prop).every(Boolean) — use arr.every(x => !!x.prop)"
metadata: { weight: 3, category: slop }
rule:
  kind: call_expression
  pattern: "$ARR.map($FN).every(Boolean)"

---
# ----------------------------------------------------------------------------
# 5. Misc anti-patterns
# ----------------------------------------------------------------------------

id: ts-string-split-index
language: typescript
severity: warning
message: "str.split('.')[1] with magic index — use destructuring or named variables"
metadata: { weight: 3, category: slop }
rule:
  kind: subscript_expression
  all:
    - has:
        kind: call_expression
        has:
          kind: member_expression
          regex: \.split$
    - has:
        kind: number
        regex: ^[1-9][0-9]*$

# ----------------------------------------------------------------------------
# Removed (oxlint covers) — paper trail for migrated sub-rules.
# Verify any future migration with a fixture test before deleting.
# ----------------------------------------------------------------------------
# - ts-isnan-check  →  eslint(no-self-compare)  (migrated 2026-05-11, verified by fixture)

---
# ----------------------------------------------------------------------------
# 6. Type-honesty guard — disables of typescript/no-unnecessary-condition mask
#    real type-system dishonesty (as-casts or required-but-optional fields).
# ----------------------------------------------------------------------------

id: no-disable-type-honesty-rules
language: TypeScript
severity: error
message: "Don't disable typescript/no-unnecessary-condition — fix the type, not the rule"
note: |
  This rule fires when the type system thinks a value can't be null/undefined
  but you added a `?.` or `!= null` check anyway. The cause is almost always a
  type assertion (`as X`) that lies, or a property declared required when
  it's actually optional. Fix the type:
    1. Drop the `as X` cast; use a type guard (`if (!isFoo(x)) return …`).
    2. Mark the field optional: `events?: { on?: …; emit?: … }`.
    3. Widen the parameter: `theme: GeminiTheme | undefined`.
  A disable here masks a real type-system signal that protects the rest of
  the file.
rule:
  kind: comment
  regex: "(oxlint|eslint)-disable.*typescript/no-unnecessary-condition"
files:
  - "src/**/*.ts"
ignores:
  - "**/__tests__/**"
  - "**/*.test.ts"
  - "**/*.spec.ts"
